# Builds CarPlayerAurora-Setup.exe with Inno Setup. Upload artifact + GitHub Release so
# https://github.com/OWNER/REPO/releases/latest/download/CarPlayerAurora-Setup.exe works.
name: Build Windows installer

on:
  workflow_dispatch:
  push:
    tags:
      - "car-installer-*"

jobs:
  innosetup:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Inno Setup
        run: choco install innosetup -y

      # Inno [Files] Excludes still packs some paths; hide heavy optional trees for a small .exe.
      - name: Exclude heavy optional paths from installer payload
        shell: pwsh
        run: |
          $stash = Join-Path $env:TEMP ("car-player-inno-stash-" + [Guid]::NewGuid().ToString("N"))
          New-Item -ItemType Directory -Path $stash -Force | Out-Null
          Add-Content -Path $env:GITHUB_ENV -Value "CAR_PLAYER_INNO_STASH=$stash"
          if (Test-Path "offline_library") { Move-Item -LiteralPath "offline_library" -Destination (Join-Path $stash "offline_library") }
          if (Test-Path ".venv") { Move-Item -LiteralPath ".venv" -Destination (Join-Path $stash "dot_venv") }
          foreach ($f in @("car-music-player.zip", "local-server-unblocked.zip")) {
            if (Test-Path $f) { Move-Item -LiteralPath $f -Destination (Join-Path $stash $f) }
          }

      - name: Compile .iss
        shell: pwsh
        run: |
          $iscc = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "ISCC not found: $iscc" }
          & $iscc "installer\CarPlayerAurora.iss"
          Get-Item "installer\Output\CarPlayerAurora-Setup.exe" | Format-List *

      - name: Restore excluded paths
        if: always()
        shell: pwsh
        run: |
          $stash = $env:CAR_PLAYER_INNO_STASH
          if (-not $stash -or -not (Test-Path $stash)) { exit 0 }
          $lib = Join-Path $stash "offline_library"
          $venv = Join-Path $stash "dot_venv"
          if (Test-Path $lib) { Move-Item -LiteralPath $lib -Destination "offline_library" }
          if (Test-Path $venv) { Move-Item -LiteralPath $venv -Destination ".venv" }
          foreach ($f in @("car-music-player.zip", "local-server-unblocked.zip")) {
            $p = Join-Path $stash $f
            if (Test-Path $p) { Move-Item -LiteralPath $p -Destination $f }
          }
          Remove-Item -LiteralPath $stash -Recurse -Force -ErrorAction SilentlyContinue

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: CarPlayerAurora-Setup
          path: installer/Output/CarPlayerAurora-Setup.exe

      - name: Create GitHub Release (tag push)
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release create $tag "installer/Output/CarPlayerAurora-Setup.exe" `
            --title $tag `
            --notes "Windows installer for Car Player / Aurora. Requires Python 3.10+ on PATH. Installs to %LOCALAPPDATA%\\CarPlayer-Aurora and starts the local server at the end."

      # Manual runs previously only uploaded an artifact — no Release → 404 on /releases/latest/download/...
      - name: Publish GitHub Release (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "car-installer-" + (Get-Date -Format "yyyyMMdd-HHmmss")
          gh release create $tag "installer/Output/CarPlayerAurora-Setup.exe" `
            --title "CarPlayer Aurora · Windows installer" `
            --notes "Built from Actions (workflow_dispatch). Requires Python 3.10+ on PATH. Installs to %LOCALAPPDATA%\\CarPlayer-Aurora and starts the local server at the end." `
            --latest
