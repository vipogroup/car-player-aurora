# מפרסם את Aurora כדף הבית ב-GitHub Pages
# אחרי הדחיפה: הגדרות הרפו → Pages → Build: GitHub Actions
# כתובת צפויה: https://vipogroup.github.io/car-player-aurora/
name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Build static site
        run: |
          mkdir -p _site
          mkdir -p _site/aurora
          cp -r aurora/* _site/aurora/
          cp manifest.json _site/manifest.json
          python - <<'PY'
          from pathlib import Path

          html = Path("aurora/index.html").read_text(encoding="utf-8")
          html = (
              html.replace("{{PLAYLIST_JSON}}", "[]")
                  .replace("{{LAN_URL_JSON}}", '""')
                  .replace("{{BUILD}}", "pages")
                  .replace("{{VERSION}}", "pages")
          )
          Path("_site/index.html").write_text(html, encoding="utf-8")
          PY

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
